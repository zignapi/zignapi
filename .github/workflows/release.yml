name: Release

# Cut a release by pushing a tag like `v0.1.0`. Keep the tag version in sync
# with `.version` in native/build.zig.zon and packages/zignapi/package.json.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build the zignapi Zig package tarball (root = build.zig.zon), which is
      # what `zignapi new` fetches via `zig fetch --save`.
      - name: Pack native sources
        run: node scripts/pack-native.mjs

      - name: Verify tag matches the packaged version
        run: |
          version="$(node -e "process.stdout.write(require('fs').readFileSync('native/build.zig.zon','utf8').match(/\.version\s*=\s*\"([^\"]+)\"/)[1])")"
          if [ "refs/tags/v${version}" != "${GITHUB_REF}" ]; then
            echo "tag ${GITHUB_REF} does not match native version v${version}" >&2
            exit 1
          fi

      # Uploads dist/zignapi-<version>.tar.gz as a release asset. This asset is
      # immutable once published — never re-upload for the same tag, or pinned
      # dependency hashes in downstream projects will break.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" dist/zignapi-*.tar.gz --generate-notes

  # Publish the CLI to npm *after* the release asset exists, so the published
  # CLI's default release URL resolves. Requires an NPM_TOKEN secret (an npm
  # "Automation" token, which bypasses 2FA) with publish rights to `zignapi`.
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Compiles the TypeScript CLI to dist/ (typescript is a workspace-root
      # devDependency; the root `prepare` script runs tsc during install).
      - name: Install and build
        run: pnpm install --frozen-lockfile

      # `prepack` verifies dist/ exists and bundles native/ as the offline fallback.
      - name: Publish
        working-directory: packages/zignapi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
