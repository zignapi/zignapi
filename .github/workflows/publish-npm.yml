name: Publish CLI to npm

# Manual trigger — run this once the GitHub release (and its native tarball
# asset) exists, so the published CLI's default release URL resolves. Requires
# an NPM_TOKEN secret with publish rights to the `zigbind` package.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # `prepack` bundles native/ into the package so an offline `zigbind new`
      # can still fall back to the local sources.
      - name: Publish
        working-directory: packages/zigbind
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
