name: Publish CLI to npm

# Manual re-publish path. The normal release flow publishes npm automatically
# (the `publish-npm` job in release.yml, on a `v*` tag). Use this to re-run a
# publish on its own — e.g. if that job failed after the release asset was
# already uploaded. Requires an NPM_TOKEN secret (an npm "Automation" token,
# which bypasses 2FA) with publish rights to the `zigbind` package.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Compiles the TypeScript CLI to dist/ (root `prepare` runs tsc on install).
      - name: Install and build
        run: pnpm install --frozen-lockfile

      # `prepack` verifies dist/ exists and bundles native/ as the offline fallback.
      - name: Publish
        working-directory: packages/zigbind
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
